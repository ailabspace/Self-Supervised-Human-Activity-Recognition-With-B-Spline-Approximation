# data
feeder: feeder.feeder_ntu.Feeder
pretrain_feeder_args:
  data_path: data/ntu/NTU60_XSub.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 120
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False
  occlude: False #True

lep_train_feeder_args:
  data_path: data/ntu/NTU60_XSub.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 120
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False
  occlude: False #True

lep_val_feeder_args:
  data_path: data/ntu/NTU60_XSub.npz
  split: test
  debug: False
  window_size: 120
  p_interval: [0.95]
  vel: False
  bone: False
  occlude: False #True

# model
model: model.transformers.MPSCP
model_args:
  # Head, Chest, L Bicep, L Forearm, L Hand, R Bicep, R Forearm, R Hand, Spine, Pelvis, L Thigh, Left Leg, Right Thigh, R Leg
  segments: [[2, 3, 20], [4, 8, 20], [0, 1, 20], [4, 5, 20], [5, 6, 7], [6, 7, 21], [6, 7, 22], [7, 21, 22], [8, 9, 20], [9, 10, 11], [10, 11, 23], [10, 11, 24], [11, 23, 24], [0, 12, 16], [0, 12, 13], [13, 14, 15], [0, 16, 17], [17, 18, 19]]
  d_model: 256
  num_heads: 8
  num_layers_enc: 8
  num_layers_dec: 2
  d_ff: 1024
  max_seq_length: 8
  dropout: 0.
  t_m: 15
  body_avg: False

work_dir: ./output_dir/3_seg_j/ntu_xsub/

# pretraining
batch_size_pretrain: 128
epochs_pretrain: 400
warmup_epochs: 20
base_lr_pretrain: 0.001
eta_min_pretrain: 5e-4
weight_decay_pretrain: 0.05
mask_ratio: 0.8

weights_transformer_path: ./output_dir/3_seg_j/ntu_xsub/final_weights/weights.pt # ./output_dir/ntu_xsub/final_weights/weights.pt

# lep
batch_size_lep: 64
epochs_lep: 100
base_lr_lep: 0.1
weight_decay_lep: 0.
num_classes: 60
labels: [
        "drink water", "eat meal", "brush teeth", "brush hair",
        "drop", "pick up", "throw", "sit down",
        "stand up", "clapping", "reading", "writing",
        "tear up paper", "put on jacket", "take off jacket", "put on a shoe",
        "take off a shoe", "put on glasses", "take off glasses", "put on a hat/cap",
        "take off a hat/cap", "cheer up", "hand waving", "kicking something",
        "reach into pocket", "hopping", "jump up", "phone call",
        "play with phone/tablet", "type on a keyboard", "point to something", "taking a selfie",
        "check time (from watch)", "rub two hands", "nod head/bow", "shake head",
        "wipe face", "salute", "put palms together", "cross hands in front",
        "sneeze/cough", "staggering", "falling down", "headache",
        "chest pain", "back pain", "neck pain", "nausea/vomiting",
        "fan self", "punch/slap", "kicking", "pushing",
        "pat on back", "point finger", "hugging", "giving object",
        "touch pocket", "shaking hands", "walking towards", "walking apart"
    ]