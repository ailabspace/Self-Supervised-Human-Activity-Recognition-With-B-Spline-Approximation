# data
feeder: feeder.feeder_ntu.Feeder
pretrain_feeder_args:
  data_path: data/pku_v2/PKUv2_XSub.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 120
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False
  occlude: False #True

lep_train_feeder_args:
  data_path: data/pku_v2/PKUv2_XSub.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 120
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False
  occlude: False #True

lep_val_feeder_args:
  data_path: data/pku_v2/PKUv2_XSub.npz
  split: test
  debug: False
  window_size: 120
  p_interval: [0.95]
  vel: False
  bone: False
  occlude: False #True

base_transformer: model.transformers.CoordTransformerBaseDecPE

# model
model: model.transformers.SegmentedSplineCoordTransformerVel2EncPE
model_args:
  # Head, Chest, Spine, L Bicep, L Forearm, L Fingers, L Thumb, L Palm, R Bicep, R Forearm, R Fingers, R Thumb, R Palm, Pelvis, L Thigh, L Knee Foot, R Thigh and R Knee Foot
  # 52.3%
