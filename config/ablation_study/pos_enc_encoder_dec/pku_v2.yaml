  # 48.1% segments: [[2, 3, 4, 8, 20], [1, 4, 8, 12, 16],[5, 6, 7, 21, 22], [9, 10, 11, 23, 24], [4, 5, 20], [5, 6, 7], [8, 9, 20], [9, 10, 11], [0, 1, 12, 16], [0, 12, 13, 14, 15], [0, 16, 17, 18, 19]]
