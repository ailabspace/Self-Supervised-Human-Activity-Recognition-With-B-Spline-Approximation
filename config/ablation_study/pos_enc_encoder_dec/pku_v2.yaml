  d_model: 256
  num_heads: 8
  num_layers_enc: 8
  num_layers_dec: 2
  d_ff: 1024
  max_seq_length: 8
  dropout: 0.
  t_m: 15
  body_avg: False
  #per_joints: True

work_dir: ./output_dir/ablation/enc_pe/pku_v2/

# pretraining
batch_size_pretrain: 128
epochs_pretrain: 400
warmup_epochs: 20
base_lr_pretrain: 0.001
eta_min_pretrain: 5e-4
weight_decay_pretrain: 0.05
mask_ratio: 0.8

weights_transformer_path: ./output_dir/ablation/enc_pe/pku_v2/final_weights/weights.pt # ./output_dir/ntu_xsub/final_weights/weights.pt

# lep
batch_size_lep: 64
epochs_lep: 100
base_lr_lep: 0.1
weight_decay_lep: 0.
num_classes: 60
